room = "elevator_ride"
music = "002_Morning_Evening"
background = "background/room_home_elevator_ride"

[layout]
left_x = 0
right_x = 0
top_y = 0
bottom_y = 0

[[layout.objects]]
sprite = "env/elevator_ride_controls"
r = { x = 271, y = 175, w = 18, h = 25 }

[[layout.collision]]
r = { x = 240, y = 200, w = 20, h = 120 }

[[layout.collision]]
r = { x = 260, y = 300, w = 40, h = 20 }

[[layout.collision]]
r = { x = 340, y = 300, w = 40, h = 20 }

[[layout.collision]]
r = { x = 380, y = 200, w = 20, h = 120 }

[[layout.collision]]
r = { x = 260, y = 200, w = 120, h = 20 }

[[layout.triggers]]
seq = """
write("(The buttons are a little worn down.)")
local at_lobby = flag("elevator_ride/at_lobby")
local floor = 0
if at_lobby == 1 then
    floor = choice({"(7)", "Nevermind"})
else
    floor = choice({"(L)", "Nevermind"})
end

if floor == 0 then
    wait(0.5)
    play_sound_and_wait("elevator_select_floor")
    set_direction(2)
    set_music("006_Elevator_Ride")
    wait(8.0)
    stop_music()
    play_sound_and_wait("elevator_ding")
    set_flag("elevator_ride/at_lobby", 1 - at_lobby)
else
    write("(Not right now.)")
end
"""
r = { x = 260, y = 200, w = 40, h = 20 }

[[layout.transitions]]
name = "enter"
enter_dir = "North"
default = true
is_save_point = false
r = { x = 300, y = 300, w = 40, h = 20 }

[[layout.transitions]]
name = "exit_floor_7"
enter_dir = "South"
to_room = "home_elevator"
to_transition = "from_elevator_ride"
default = false
is_save_point = false
props = { disable_if_flag = "elevator_ride/at_lobby" }
r = { x = 300, y = 320, w = 40, h = 20 }

[[layout.transitions]]
name = "exit_lobby"
enter_dir = "South"
to_room = "home_lobby"
to_transition = "from_elevator_ride"
default = false
is_save_point = false
props = { enable_if_flag = "elevator_ride/at_lobby" }
r = { x = 300, y = 320, w = 40, h = 20 }
